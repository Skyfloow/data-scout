version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: data-scout-server
    restart: unless-stopped
    ports:
      # Expose internal port 3000 to the host as 3001 (optional, for direct API access if needed)
      - "3001:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost:8080,http://127.0.0.1:8080
      # Data directory path inside container:
      - DATA_DIR=./data
    env_file:
      - .env
    volumes:
      # Persist SQLite databases and scraping outputs
      - ./server/data:/app/server/data
      - ./server/storage:/app/server/storage

  scrapper-ui:
    build:
      context: .
      dockerfile: ./scrapper-ui/Dockerfile
      args:
        # Build Vite with relative base URL. Nginx will proxy /api to the backend.
        - VITE_API_URL=/api/
    container_name: data-scout-ui
    restart: unless-stopped
    ports:
      # Nginx listens on 80 inside container, expose to 8080 on host
      - "8080:80"
    depends_on:
      - server
